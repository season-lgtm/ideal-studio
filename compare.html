<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#fff;font-family:'Poppins',sans-serif;padding:30px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1180px;margin:0 auto;}
  .item{text-align:center;}
  .blob{width:240px;height:240px;border-radius:50%;background:radial-gradient(circle at 50% 42%,#FBE4EE,#FDEFF6);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .lab{font-weight:600;color:#E27BA0;font-size:15px;}
  .num{font-size:12px;color:#a8929c;letter-spacing:2px;}
  svg{display:block;}
</style></head>
<body>
<div class="grid">

  <!-- 1 SPA GLOW GIRL -->
  <div class="item">
    <div class="blob">
    <svg width="180" height="180" viewBox="0 0 200 200">
      <g stroke="#E27BA0" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M60 100 q-8 -56 40 -62 q48 6 40 62 q4 40 -40 46 q-44 -6 -40 -46Z" fill="#FBE0EC"/>
        <ellipse cx="100" cy="106" rx="40" ry="38" fill="#FFF4F8"/>
        <path d="M62 88 q38 -20 76 0 l0 -13 q-38 -19 -76 0Z" fill="#F8CCDF"/>
        <circle cx="100" cy="56" r="11" fill="#F8CCDF"/>
        <path d="M78 106 q8 8 16 0"/><path d="M106 106 q8 8 16 0"/>
        <path d="M78 103 l-4 -4 M86 102 l0 -5 M94 103 l4 -4"/>
        <path d="M106 103 l-4 -4 M114 102 l0 -5 M122 103 l4 -4"/>
        <path d="M92 122 q8 7 16 0"/>
      </g>
      <circle cx="75" cy="118" r="7.5" fill="#F7B8D2"/><circle cx="125" cy="118" r="7.5" fill="#F7B8D2"/>
      <g fill="#F0A6C6"><path d="M150 64 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4Z"/><circle cx="46" cy="92" r="4"/></g>
    </svg>
    </div>
    <div class="lab">Spa Glow Girl</div><div class="num">01 · 敷脸少女</div>
  </div>

  <!-- 2 SHEET MASK CUTIE -->
  <div class="item">
    <div class="blob">
    <svg width="180" height="180" viewBox="0 0 200 200">
      <g stroke="#E27BA0" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M58 98 q-6 -54 42 -58 q48 4 42 58 q4 42 -42 48 q-46 -6 -42 -48Z" fill="#FBE0EC"/>
        <ellipse cx="100" cy="104" rx="41" ry="40" fill="#FFF4F8"/>
        <!-- sheet mask -->
        <rect x="64" y="72" width="72" height="74" rx="26" fill="#FDEAF2"/>
        <!-- eye holes -->
        <path d="M80 104 q7 7 14 0"/><path d="M106 104 q7 7 14 0"/>
        <path d="M82 101 l-3 -4 M87 100 l0 -5 M92 101 l3 -4"/>
        <path d="M108 101 l-3 -4 M113 100 l0 -5 M118 101 l3 -4"/>
        <!-- mouth hole -->
        <path d="M93 124 q7 6 14 0"/>
        <!-- mask cute marks -->
        <path d="M72 86 q4 3 8 0 M120 86 q4 3 8 0" stroke-width="2.4"/>
      </g>
      <circle cx="78" cy="118" r="6.5" fill="#F7B8D2"/><circle cx="122" cy="118" r="6.5" fill="#F7B8D2"/>
      <g fill="#F0A6C6"><path d="M150 70 l3.5 9 l9 3.5 l-9 3.5 l-3.5 9 l-3.5 -9 l-9 -3.5 l9 -3.5Z"/></g>
    </svg>
    </div>
    <div class="lab">Sheet-Mask Cutie</div><div class="num">02 · 面膜娃娃</div>
  </div>

  <!-- 3 WINK LASH GIRL -->
  <div class="item">
    <div class="blob">
    <svg width="180" height="180" viewBox="0 0 200 200">
      <g stroke="#E27BA0" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M58 96 q-4 -56 42 -60 q50 4 44 60 q2 26 -14 38 l-2 14 q-28 8 -56 0 l-2 -14 q-16 -12 -14 -38Z" fill="#FBE0EC"/>
        <ellipse cx="100" cy="104" rx="40" ry="38" fill="#FFF4F8"/>
        <!-- open eye -->
        <ellipse cx="84" cy="104" rx="6" ry="8" fill="#5b4750" stroke="none"/>
        <circle cx="86" cy="101" r="2" fill="#fff" stroke="none"/>
        <path d="M75 96 q9 -6 18 -1" stroke-width="2.6"/>
        <path d="M75 96 l-4 -3 M80 93 l-1 -4" stroke-width="2.4"/>
        <!-- wink eye -->
        <path d="M108 106 q8 6 17 -1"/>
        <path d="M110 104 l-3 -5 M116 103 l0 -6 M122 104 l4 -5"/>
        <!-- smile -->
        <path d="M90 122 q10 9 20 0"/>
      </g>
      <circle cx="74" cy="118" r="7" fill="#F7B8D2"/><circle cx="126" cy="118" r="7" fill="#F7B8D2"/>
      <g fill="#F0A6C6"><path d="M138 58 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4Z"/></g>
    </svg>
    </div>
    <div class="lab">Wink &amp; Lash</div><div class="num">03 · 眨眼睫毛</div>
  </div>

  <!-- 4 FLOWER BEAUTY -->
  <div class="item">
    <div class="blob">
    <svg width="180" height="180" viewBox="0 0 200 200">
      <g stroke="#E27BA0" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M60 100 q-8 -58 40 -62 q48 4 40 62 q4 40 -40 46 q-44 -6 -40 -46Z" fill="#FBE0EC"/>
        <ellipse cx="100" cy="106" rx="40" ry="38" fill="#FFF4F8"/>
        <!-- soft eyes -->
        <path d="M80 106 q7 7 14 0"/><path d="M106 106 q7 7 14 0"/>
        <path d="M80 103 l-4 -4 M87 102 l0 -5 M94 103 l4 -4"/>
        <path d="M106 103 l-4 -4 M113 102 l0 -5 M120 103 l4 -4"/>
        <path d="M92 122 q8 7 16 0"/>
      </g>
      <circle cx="76" cy="118" r="7.5" fill="#F7B8D2"/><circle cx="124" cy="118" r="7.5" fill="#F7B8D2"/>
      <!-- flower on hair -->
      <g><g fill="#F4B3CC"><circle cx="138" cy="74" r="6"/><circle cx="150" cy="80" r="6"/><circle cx="146" cy="92" r="6"/><circle cx="132" cy="92" r="6"/><circle cx="128" cy="80" r="6"/></g><circle cx="139" cy="83" r="5" fill="#E27BA0"/></g>
      <g fill="#F0A6C6"><circle cx="52" cy="78" r="4"/><path d="M150 120 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3Z"/></g>
    </svg>
    </div>
    <div class="lab">Flower Beauty</div><div class="num">04 · 花朵美人</div>
  </div>

</div>
</body></html>
